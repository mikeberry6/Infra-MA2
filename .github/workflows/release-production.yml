name: Promote Dashboard Release

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: Full Git SHA at the protected main head
        required: true
        type: string
      deployment_url:
        description: Immutable Vercel deployment URL built from release_sha
        required: true
        type: string
      confirmation:
        description: Type PROMOTE to authorize production promotion
        required: true
        type: string

permissions:
  contents: read
  checks: read

concurrency:
  group: production-release
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: production
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      EXPECTED_DATABASE_HOST: ${{ vars.PRODUCTION_DATABASE_HOST }}
      EXPECTED_DATABASE_NAME: ${{ vars.PRODUCTION_DATABASE_NAME }}
      FORBIDDEN_DATABASE_HOST: ${{ vars.MIGRATION_DATABASE_HOST }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
      SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      DASHBOARD_WRITES_ENABLED: ${{ vars.DASHBOARD_WRITES_ENABLED }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_SCOPE: ${{ vars.VERCEL_SCOPE }}
      EXPECTED_VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      EXPECTED_GITHUB_REPOSITORY_ID: ${{ github.repository_id }}
      RELEASE_SHA: ${{ inputs.release_sha }}
      DEPLOYMENT_URL: ${{ inputs.deployment_url }}
      PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
      CANONICAL_PRODUCTION_URL: https://infra-ma-2.vercel.app
      CONFIRMATION: ${{ inputs.confirmation }}
    steps:
      - name: Require explicit production authorization
        run: |
          if [ "$CONFIRMATION" != "PROMOTE" ]; then
            echo "::error::confirmation must exactly equal PROMOTE."
            exit 1
          fi

      - name: Checkout approved release
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.release_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify checked-out release identity
        run: |
          [[ "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::release_sha must be a full lowercase Git SHA."
            exit 1
          }
          [ "$(git rev-parse HEAD)" = "$RELEASE_SHA" ] || {
            echo "::error::Checked-out SHA does not match release_sha."
            exit 1
          }

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm

      - name: Verify protected-main and required-check provenance
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          node --experimental-strip-types scripts/verify-release-provenance.ts \
            --release-sha="$RELEASE_SHA" \
            --branch=main \
            --required-check=build \
            --output=tmp/release/release-provenance.json

      - name: Require protected production configuration
        shell: bash
        run: |
          missing=0
          for name in DATABASE_URL EXPECTED_DATABASE_HOST EXPECTED_DATABASE_NAME FORBIDDEN_DATABASE_HOST FRED_API_KEY EIA_API_KEY SAM_API_KEY SEC_USER_AGENT VERCEL_TOKEN VERCEL_SCOPE EXPECTED_VERCEL_PROJECT_ID EXPECTED_GITHUB_REPOSITORY_ID PRODUCTION_URL; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required."
              missing=1
            fi
          done
          if [ "$DASHBOARD_WRITES_ENABLED" != "true" ]; then
            echo "::error::DASHBOARD_WRITES_ENABLED must be true only after the all-source dry-run is reviewed."
            missing=1
          fi
          [[ "$EXPECTED_VERCEL_PROJECT_ID" =~ ^prj_[A-Za-z0-9]+$ ]] || {
            echo "::error::VERCEL_PROJECT_ID must be an immutable prj_ identifier."
            missing=1
          }
          if [ "$PRODUCTION_URL" != "$CANONICAL_PRODUCTION_URL" ]; then
            echo "::error::The protected PRODUCTION_URL does not match the canonical InfraSight production alias."
            missing=1
          fi
          node - <<'NODE'
          const parsed = new URL(process.env.DEPLOYMENT_URL);
          if (parsed.protocol !== "https:" || parsed.username || parsed.password || parsed.port || parsed.pathname !== "/" || parsed.search || parsed.hash) {
            throw new Error("deployment_url must be an HTTPS origin without credentials, path, query, or fragment.");
          }
          NODE
          if [ "$missing" -ne 0 ]; then exit 1; fi

      - name: Install, generate, and validate
        run: |
          npm ci
          npx prisma generate
          npx prisma validate

      - name: Inspect and smoke-test immutable candidate
        shell: bash
        run: |
          mkdir -p tmp/release
          node --experimental-strip-types scripts/verify-vercel-deployment.ts \
            --deployment-url="$DEPLOYMENT_URL" \
            --expected-sha="$RELEASE_SHA" \
            --expected-project-id="$EXPECTED_VERCEL_PROJECT_ID" \
            --expected-github-repository-id="$EXPECTED_GITHUB_REPOSITORY_ID" \
            --require-immutable-url \
            --output=tmp/release/candidate-inspect.json
          node scripts/release-smoke.mjs \
            --base-url="$DEPLOYMENT_URL" \
            --expected-version="$RELEASE_SHA" \
            --skip-health \
            --output=tmp/release/candidate-smoke.json

      - name: Require staged production schema
        shell: bash
        run: |
          set -o pipefail
          node --experimental-strip-types scripts/assert-database-target.ts
          npx prisma migrate status 2>&1 | tee tmp/release/migrate-status.log
          npx prisma migrate diff --from-schema=prisma/schema.prisma --to-config-datasource --exit-code 2>&1 | tee tmp/release/schema-drift.log

      - name: Verify dashboard publication and recurring-run gates
        shell: bash
        run: |
          set -o pipefail
          npm run dashboard:verify -- --require-complete
          cp tmp/dashboard-verify-summary.json tmp/release/dashboard-source-verification.json
          npx tsx scripts/verify-dashboard-health.ts \
            --window-days=30 \
            --max-age-hours=36 \
            --min-success-rate=0.95 \
            --output=tmp/release/dashboard-reliability.json

      - name: Reverify exact release immediately before promotion
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          node --experimental-strip-types scripts/verify-release-provenance.ts \
            --release-sha="$RELEASE_SHA" \
            --branch=main \
            --required-check=build \
            --output=tmp/release/release-provenance-before-promotion.json
          node --experimental-strip-types scripts/assert-database-target.ts

      - name: Reverify and promote the immutable candidate
        shell: bash
        run: |
          node --experimental-strip-types scripts/verify-vercel-deployment.ts \
            --deployment-url="$DEPLOYMENT_URL" \
            --expected-sha="$RELEASE_SHA" \
            --expected-project-id="$EXPECTED_VERCEL_PROJECT_ID" \
            --expected-github-repository-id="$EXPECTED_GITHUB_REPOSITORY_ID" \
            --require-immutable-url \
            --output=tmp/release/candidate-inspect-before-promotion.json
          deployment_id="$(jq -r '.id' tmp/release/candidate-inspect-before-promotion.json)"
          [[ "$deployment_id" =~ ^dpl_[A-Za-z0-9]+$ ]] || {
            echo "::error::Verified deployment ID is invalid."
            exit 1
          }
          npx --yes vercel@51.7.0 promote "$deployment_id" \
            --timeout 3m --yes --token "$VERCEL_TOKEN" --scope "$VERCEL_SCOPE"

      - name: Smoke-test canonical production release
        run: >-
          node scripts/release-smoke.mjs
          --base-url="$PRODUCTION_URL"
          --expected-version="$RELEASE_SHA"
          --skip-health
          --output=tmp/release/production-smoke.json

      - name: Upload immutable release evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dashboard-production-release-${{ github.run_id }}
          path: tmp/release/
          if-no-files-found: warn
          retention-days: 90
