name: Promote Production Release

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: Full Git commit SHA that passed the required release gate
        required: true
        type: string
      deployment_url:
        description: Ready Vercel deployment URL built from release_sha
        required: true
        type: string
      production_url:
        description: Canonical production origin
        required: true
        default: https://infra-ma-2.vercel.app
        type: string
      confirmation:
        description: Type PROMOTE to authorize schema-first production release
        required: true
        type: string

permissions:
  contents: read
  checks: read

concurrency:
  group: production-release
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: production
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
      SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      EXPECTED_DATABASE_HOST: ${{ vars.PRODUCTION_DATABASE_HOST }}
      EXPECTED_DATABASE_NAME: ${{ vars.PRODUCTION_DATABASE_NAME }}
      DASHBOARD_WRITES_ENABLED: ${{ vars.DASHBOARD_WRITES_ENABLED }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_SCOPE: ${{ vars.VERCEL_SCOPE }}
      EXPECTED_VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      RELEASE_SHA: ${{ inputs.release_sha }}
      DEPLOYMENT_URL: ${{ inputs.deployment_url }}
      PRODUCTION_URL: ${{ inputs.production_url }}
      CONFIRMATION: ${{ inputs.confirmation }}
    steps:
      - name: Require explicit production authorization
        run: |
          if [ "$CONFIRMATION" != "PROMOTE" ]; then
            echo "::error::confirmation must exactly equal PROMOTE."
            exit 1
          fi

      - name: Checkout approved release
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ inputs.release_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify checked-out release identity
        run: |
          if ! [[ "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::release_sha must be a full lowercase Git SHA."
            exit 1
          fi
          if [ "$(git rev-parse HEAD)" != "$RELEASE_SHA" ]; then
            echo "::error::Checked-out SHA does not match release_sha."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm

      - name: Verify protected-branch and required-check provenance
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          node --experimental-strip-types scripts/verify-release-provenance.ts \
            --release-sha="$RELEASE_SHA" \
            --branch=main \
            --required-check=build \
            --output=tmp/release/release-provenance.json

      - name: Require protected production configuration
        run: |
          missing=0
          for name in DATABASE_URL EXPECTED_DATABASE_HOST EXPECTED_DATABASE_NAME VERCEL_TOKEN VERCEL_SCOPE EXPECTED_VERCEL_PROJECT_ID FRED_API_KEY EIA_API_KEY SAM_API_KEY SEC_USER_AGENT; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required."
              missing=1
            fi
          done
          if [ "$DASHBOARD_WRITES_ENABLED" != "true" ]; then
            echo "::error::DASHBOARD_WRITES_ENABLED must be true only after a reviewed all-source live dry-run."
            missing=1
          fi
          if ! [[ "$EXPECTED_VERCEL_PROJECT_ID" =~ ^prj_[A-Za-z0-9]+$ ]]; then
            echo "::error::VERCEL_PROJECT_ID must be an immutable prj_ identifier."
            missing=1
          fi
          node - <<'NODE'
          for (const name of ["DEPLOYMENT_URL", "PRODUCTION_URL"]) {
            const value = process.env[name];
            let parsed;
            try {
              parsed = new URL(value);
            } catch {
              throw new Error(`${name} must be an absolute URL.`);
            }
            if (parsed.protocol !== "https:" || parsed.username || parsed.password) {
              throw new Error(`${name} must be an HTTPS URL without embedded credentials.`);
            }
            if (parsed.pathname !== "/" || parsed.search || parsed.hash) {
              throw new Error(`${name} must be an origin without a path, query, or fragment.`);
            }
          }
          NODE
          if [ "$missing" -ne 0 ]; then exit 1; fi

      - name: Install locked dependencies
        run: npm ci

      - name: Generate and validate Prisma client
        run: |
          npm run db:generate
          npm run db:validate

      - name: Inspect and smoke-test candidate before production writes
        shell: bash
        run: |
          mkdir -p tmp/release
          set -o pipefail
          npx --yes vercel@51.7.0 inspect "$DEPLOYMENT_URL" --wait --timeout 3m --format=json --scope "$VERCEL_SCOPE" > tmp/release/candidate-inspect.json
          jq -e --arg sha "$RELEASE_SHA" --arg project "$EXPECTED_VERCEL_PROJECT_ID" '
            .readyState == "READY"
            and .target == "production"
            and .projectId == $project
            and .meta.githubCommitSha == $sha
          ' tmp/release/candidate-inspect.json >/dev/null
          node scripts/release-smoke.mjs --base-url="$DEPLOYMENT_URL" --expected-version="$RELEASE_SHA" --output=tmp/release/candidate-smoke.json

      - name: Prove production database target
        run: node --experimental-strip-types scripts/assert-database-target.ts

      - name: Require production schema to be staged already
        shell: bash
        run: |
          set -o pipefail
          npx prisma migrate status 2>&1 | tee tmp/release/migrate-status.log
          npx prisma migrate diff --from-schema=prisma/schema.prisma --to-config-datasource --exit-code 2>&1 | tee tmp/release/schema-drift.log

      - name: Verify production data and source gates
        shell: bash
        run: |
          set -o pipefail
          npm run db:verify 2>&1 | tee tmp/release/database-verification.log
          npx tsx scripts/report-primary-citation-remediation.ts --output=tmp/release/primary-citation-approval-template.json
          npx tsx scripts/source-coverage-report.ts --require-complete --output=tmp/release/source-coverage.json
          npx tsx scripts/report-company-merge-candidates.ts --published-only --require-clean > tmp/release/company-canonical-review.md
          npm run dashboard:verify -- --require-complete
          cp tmp/dashboard-verify-summary.json tmp/release/dashboard-source-verification.json

      - name: Require healthy critical pipelines before promotion
        run: |
          node --experimental-strip-types scripts/verify-pipeline-health.ts --pipeline=DASHBOARD_SYNC --max-age-hours=36 --expected-runs-per-week=5 --min-success-rate=0.95 --output=tmp/release/dashboard-reliability.json
          node --experimental-strip-types scripts/verify-pipeline-health.ts --pipeline=NEWS_SCAN --max-age-hours=36 --expected-runs-per-week=7 --min-success-rate=0.95 --output=tmp/release/news-reliability.json

      - name: Reverify exact main head immediately before promotion
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          node --experimental-strip-types scripts/verify-release-provenance.ts \
            --release-sha="$RELEASE_SHA" \
            --branch=main \
            --required-check=build \
            --output=tmp/release/release-provenance-before-promotion.json

      - name: Promote validated deployment
        run: >-
          npx --yes vercel@51.7.0 promote "$DEPLOYMENT_URL"
          --timeout 3m --yes --scope "$VERCEL_SCOPE"

      - name: Smoke-test canonical production release
        run: >-
          node scripts/release-smoke.mjs
          --base-url="$PRODUCTION_URL"
          --expected-version="$RELEASE_SHA"
          --output=tmp/release/production-smoke.json

      - name: Upload immutable release evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: production-release-${{ github.run_id }}
          path: tmp/release/
          if-no-files-found: warn
          retention-days: 90
