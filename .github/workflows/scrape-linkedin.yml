name: Collect LinkedIn Research Candidates

on:
  # repository_dispatch executes the workflow from the default branch and
  # prevents branch-selected scraper code from receiving the Apify token.
  repository_dispatch:
    types: [collect-linkedin-candidates]

permissions:
  contents: read

concurrency:
  group: linkedin-research-candidates
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: refs/heads/main
          fetch-depth: 1
          persist-credentials: false

      - name: Verify exact default-branch scraper provenance
        shell: bash
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" != "repository_dispatch" ] || [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::Research collection must execute from refs/heads/main."
            exit 1
          fi
          if ! [[ "$GITHUB_SHA" =~ ^[0-9a-f]{40}$ ]] || [ "$(git rev-parse HEAD)" != "$GITHUB_SHA" ] || [ "$(git rev-parse refs/heads/main)" != "$GITHUB_SHA" ]; then
            echo "::error::Checked-out scraper code does not match the triggering main revision."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Require Apify credential
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: test -n "$APIFY_TOKEN" || { echo "::error::APIFY_TOKEN is required."; exit 1; }

      - name: Collect LinkedIn company posts
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python3 scripts/run_apify_scraper.py

      - name: Filter research candidates
        run: python3 scripts/filter_linkedin_posts.py

      # Candidate output is deliberately review-only. The workflow never writes
      # to a protected branch and never publishes deals or portfolio companies.
      - name: Upload review candidates
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linkedin-research-candidates-${{ github.run_id }}
          path: |
            scripts/linkedin_raw_posts.json
            scripts/linkedin_filtered_posts.json
          if-no-files-found: error
          retention-days: 30
