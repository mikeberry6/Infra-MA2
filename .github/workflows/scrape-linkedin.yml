name: Scrape LinkedIn Company Posts

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/setup-apify-mcp-3Y2d7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Apify LinkedIn Scraper
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python3 scripts/run_apify_scraper.py

      - name: Run Post Filter
        run: python3 scripts/filter_linkedin_posts.py

      - name: Commit Results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/linkedin_raw_posts.json scripts/linkedin_filtered_posts.json
          git commit -m "Add LinkedIn scraped posts and filtered results"
          git push origin claude/setup-apify-mcp-3Y2d7
