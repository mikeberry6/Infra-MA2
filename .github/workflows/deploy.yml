name: CI Build

on:
  push:
    branches: ["main", "master", "claude/**", "codex/**"]
  pull_request:
    branches: ["main", "master", "claude/infratracker-platform-FCgI9"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run db:validate

      - name: Check migration state on Neon validation branch
        env:
          DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "MIGRATION_DATABASE_URL is required for the release gate."
            exit 1
          fi
          npx prisma migrate status

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Validate seed data
        run: npm run validate-portfolios

      - name: Validate latest weekly email
        run: npm run validate-weekly-email

      - name: Verify database integrity and citation coverage
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL is required for the release gate."
            exit 1
          fi
          npm run db:verify

      - name: Audit production dependencies
        run: npm run audit:prod

      - name: Build
        run: npm run build
