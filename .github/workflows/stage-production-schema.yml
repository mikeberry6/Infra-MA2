name: Stage Production Schema

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: Full Git commit SHA that passed the required release gate
        required: true
        type: string
      production_app_sha:
        description: Full SHA of the application currently serving production
        required: true
        type: string
      migration_base_sha:
        description: Full SHA whose migration set exactly matches production
        required: true
        type: string
      migration_manifest_sha256:
        description: SHA-256 from the reviewed additive migration manifest for base..release
        required: true
        type: string
      confirmation:
        description: Type STAGE to authorize additive production migrations
        required: true
        type: string

permissions:
  contents: read
  checks: read

concurrency:
  group: production-release
  cancel-in-progress: false

jobs:
  stage-schema:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: ${{ secrets.PRODUCTION_MIGRATION_DATABASE_URL }}
      EXPECTED_DATABASE_HOST: ${{ vars.PRODUCTION_MIGRATION_DATABASE_HOST }}
      EXPECTED_DATABASE_NAME: ${{ vars.PRODUCTION_DATABASE_NAME }}
      FORBIDDEN_DATABASE_HOST: ${{ vars.MIGRATION_DATABASE_HOST }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
      EXPECTED_VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      EXPECTED_GITHUB_REPOSITORY_ID: ${{ github.repository_id }}
      DASHBOARD_WRITES_ENABLED: ${{ vars.DASHBOARD_WRITES_ENABLED }}
      RELEASE_SHA: ${{ inputs.release_sha }}
      PRODUCTION_APP_SHA: ${{ inputs.production_app_sha }}
      MIGRATION_BASE_SHA: ${{ inputs.migration_base_sha }}
      MIGRATION_MANIFEST_SHA256: ${{ inputs.migration_manifest_sha256 }}
      PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
      CONFIRMATION: ${{ inputs.confirmation }}
    steps:
      - name: Require protected workflow ref
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::Production schema workflows must be dispatched from refs/heads/main."
            exit 1
          fi

      - name: Require explicit schema authorization
        run: |
          if [ "$CONFIRMATION" != "STAGE" ]; then
            echo "::error::confirmation must exactly equal STAGE."
            exit 1
          fi

      - name: Checkout approved release
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: refs/heads/main
          fetch-depth: 0
          persist-credentials: false

      - name: Verify checked-out release identity
        run: |
          if ! [[ "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::release_sha must be a full lowercase Git SHA."
            exit 1
          fi
          if [ "$(git rev-parse HEAD)" != "$RELEASE_SHA" ]; then
            echo "::error::Checked-out SHA does not match release_sha."
            exit 1
          fi
          if ! [[ "$PRODUCTION_APP_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::production_app_sha must be a full Git SHA."
            exit 1
          fi
          if ! [[ "$MIGRATION_BASE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::migration_base_sha must be a full Git SHA."
            exit 1
          fi
          git merge-base --is-ancestor "$MIGRATION_BASE_SHA" "$RELEASE_SHA" || {
            echo "::error::migration_base_sha must be an ancestor of release_sha."
            exit 1
          }
          git merge-base --is-ancestor "$PRODUCTION_APP_SHA" "$RELEASE_SHA" || {
            echo "::error::production_app_sha must be an ancestor of release_sha."
            exit 1
          }

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm

      - name: Verify protected-branch and required-check provenance
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          node --experimental-strip-types scripts/verify-release-provenance.ts \
            --release-sha="$RELEASE_SHA" \
            --branch=main \
            --required-check=build \
            --output=tmp/schema-stage/release-provenance.json

      - name: Require the reviewed additive migration manifest
        run: >-
          node --experimental-strip-types scripts/audit-additive-migrations.ts
          --base-sha="$MIGRATION_BASE_SHA"
          --production-app-sha="$PRODUCTION_APP_SHA"
          --release-sha="$RELEASE_SHA"
          --expected-manifest-sha256="$MIGRATION_MANIFEST_SHA256"
          --output=tmp/schema-stage/migration-manifest.json

      - name: Require protected production configuration
        run: |
          test -n "$DATABASE_URL" || { echo "::error::DATABASE_URL is required."; exit 1; }
          test -n "$EXPECTED_DATABASE_HOST" || { echo "::error::PRODUCTION_MIGRATION_DATABASE_HOST is required."; exit 1; }
          test -n "$EXPECTED_DATABASE_NAME" || { echo "::error::PRODUCTION_DATABASE_NAME is required."; exit 1; }
          test -n "$FORBIDDEN_DATABASE_HOST" || { echo "::error::MIGRATION_DATABASE_HOST is required."; exit 1; }
          test -n "$VERCEL_TOKEN" || { echo "::error::VERCEL_TOKEN is required."; exit 1; }
          test -n "$EXPECTED_VERCEL_PROJECT_ID" || { echo "::error::VERCEL_PROJECT_ID is required."; exit 1; }
          test -n "$EXPECTED_GITHUB_REPOSITORY_ID" || { echo "::error::GitHub repository ID is required."; exit 1; }
          test -n "$PRODUCTION_URL" || { echo "::error::PRODUCTION_URL is required."; exit 1; }
          if [ "$DASHBOARD_WRITES_ENABLED" != "false" ]; then
            echo "::error::DASHBOARD_WRITES_ENABLED must exactly equal false throughout schema staging and reviewed dashboard cutovers."
            exit 1
          fi
          node - <<'NODE'
          const value = process.env.PRODUCTION_URL;
          const parsed = new URL(value);
          if (parsed.protocol !== "https:" || parsed.username || parsed.password || parsed.port || parsed.pathname !== "/" || parsed.search || parsed.hash) {
            throw new Error("production_url must be an HTTPS origin without credentials, path, query, or fragment.");
          }
          NODE

      - name: Install, generate, and validate
        run: |
          npm ci
          npm run db:generate
          npm run db:validate

      - name: Prove production database target
        run: node --experimental-strip-types scripts/assert-database-target.ts

      - name: Prove the current production application SHA
        run: >-
          node --experimental-strip-types scripts/verify-vercel-deployment.ts
          --deployment-url="$PRODUCTION_URL"
          --expected-sha="$PRODUCTION_APP_SHA"
          --expected-project-id="$EXPECTED_VERCEL_PROJECT_ID"
          --expected-github-repository-id="$EXPECTED_GITHUB_REPOSITORY_ID"
          --team-id="$VERCEL_TEAM_ID"
          --output=tmp/schema-stage/production-app-inspect.json

      - name: Prove the applied production migration baseline
        run: >-
          node --experimental-strip-types scripts/verify-migration-baseline.ts
          --base-sha="$MIGRATION_BASE_SHA"
          --output=tmp/schema-stage/migration-baseline.json

      - name: Reverify exact main head immediately before production writes
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          ./node_modules/.bin/tsx scripts/verify-release-provenance.ts \
            --release-sha="$RELEASE_SHA" \
            --branch=main \
            --required-check=build \
            --output=tmp/schema-stage/release-provenance-before-write.json

      - name: Apply additive migrations while prior application remains active
        shell: bash
        run: |
          mkdir -p tmp/schema-stage
          set -o pipefail
          node --experimental-strip-types scripts/verify-vercel-deployment.ts \
            --deployment-url="$PRODUCTION_URL" \
            --expected-sha="$PRODUCTION_APP_SHA" \
            --expected-project-id="$EXPECTED_VERCEL_PROJECT_ID" \
            --expected-github-repository-id="$EXPECTED_GITHUB_REPOSITORY_ID" \
            --team-id="$VERCEL_TEAM_ID" \
            --output=tmp/schema-stage/production-app-inspect-before-write.json
          node --experimental-strip-types scripts/verify-migration-baseline.ts \
            --base-sha="$MIGRATION_BASE_SHA" \
            --output=tmp/schema-stage/migration-baseline-before-write.json
          ./node_modules/.bin/prisma migrate deploy 2>&1 | tee tmp/schema-stage/migrate-deploy.log
          node --experimental-strip-types scripts/verify-migration-baseline.ts \
            --base-sha="$RELEASE_SHA" \
            --output=tmp/schema-stage/migration-baseline-after-write.json
          ./node_modules/.bin/prisma migrate status 2>&1 | tee tmp/schema-stage/migrate-status.log
          ./node_modules/.bin/prisma migrate diff --from-schema=prisma/schema.prisma --to-config-datasource --exit-code 2>&1 | tee tmp/schema-stage/schema-drift.log

      - name: Record post-stage remediation backlogs without blocking additive schema compatibility
        shell: bash
        run: |
          set -o pipefail
          ./node_modules/.bin/tsx scripts/quarantine-dashboard-methodology-history.ts \
            --output=tmp/schema-stage/dashboard-methodology-cutover-approval-template.json \
            2>&1 | tee tmp/schema-stage/dashboard-methodology-cutover-report.log
          ./node_modules/.bin/tsx scripts/backfill-dashboard-signal-approvals.ts \
            --output=tmp/schema-stage/dashboard-signal-backfill-approval-template.json \
            2>&1 | tee tmp/schema-stage/dashboard-signal-backfill-report.log
          ./node_modules/.bin/tsx scripts/report-primary-citation-remediation.ts --output=tmp/schema-stage/primary-citation-approval-template.json
          ./node_modules/.bin/tsx scripts/report-ownership-fund-link-remediation.ts --output=tmp/schema-stage/ownership-fund-link-approval-template.json
          ./node_modules/.bin/tsx scripts/report-deal-seller-disclosure-remediation.ts --output=tmp/schema-stage/deal-seller-disclosure-approval-template.json
          ./node_modules/.bin/tsx scripts/source-coverage-report.ts --output=tmp/schema-stage/source-coverage.json
          ./node_modules/.bin/tsx scripts/report-company-merge-candidates.ts \
            --published-only \
            --approval-output=tmp/schema-stage/company-merge-approval-template.json \
            > tmp/schema-stage/company-canonical-review.md

      - name: Upload schema-stage evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-schema-stage-${{ github.run_id }}
          path: tmp/schema-stage/
          if-no-files-found: warn
          retention-days: 90
