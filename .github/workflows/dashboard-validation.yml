name: Dashboard Validation

on:
  push:
    branches:
      - codex/recurring-dashboard-sources
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/dashboard-validation.yml"
      - "package.json"
      - "package-lock.json"
      - "prisma/schema.prisma"
      - "prisma/migrations/**"
      - "scripts/assert-database-target.ts"
      - "scripts/backfill-dashboard-signal-approvals.ts"
      - "scripts/dashboard-*.ts"
      - "scripts/quarantine-dashboard-methodology-history.ts"
      - "src/app/admin/dashboard-signals/**"
      - "src/app/admin/page.tsx"
      - "src/app/dashboard/**"
      - "src/components/admin/DashboardSignalReviewButtons*"
      - "src/components/dashboard/**"
      - "src/modules/auth/guards.ts"
      - "src/modules/dashboard/**"
  workflow_dispatch:

permissions:
  contents: read

# Every run mutates the same disposable Neon validation branch. Do not cancel a
# migration or cutover halfway through, and never let two runs overlap.
concurrency:
  group: dashboard-neon-validation
  cancel-in-progress: false

jobs:
  validate-dashboard:
    name: Validate dashboard migration and application
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
      EXPECTED_DATABASE_HOST: ${{ vars.MIGRATION_DATABASE_HOST }}
      EXPECTED_DATABASE_NAME: ${{ vars.MIGRATION_DATABASE_NAME }}
      FORBIDDEN_DATABASE_HOST: ${{ vars.PRODUCTION_DATABASE_HOST }}

    steps:
      - name: Checkout candidate
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm

      - name: Require the isolated Neon validation target
        shell: bash
        run: |
          test -n "$DATABASE_URL" || { echo "::error::MIGRATION_DATABASE_URL is required."; exit 1; }
          test -n "$EXPECTED_DATABASE_HOST" || { echo "::error::MIGRATION_DATABASE_HOST is required."; exit 1; }
          test -n "$EXPECTED_DATABASE_NAME" || { echo "::error::MIGRATION_DATABASE_NAME is required."; exit 1; }
          test -n "$FORBIDDEN_DATABASE_HOST" || { echo "::error::PRODUCTION_DATABASE_HOST is required."; exit 1; }
          node --experimental-strip-types scripts/assert-database-target.ts

      - name: Install, generate, and validate Prisma
        run: |
          npm ci
          npx prisma generate
          npx prisma validate

      - name: Apply migration and cutovers twice to prove idempotence
        shell: bash
        run: |
          mkdir -p tmp/dashboard-validation
          set -o pipefail
          for pass in initial repeat; do
            npx prisma migrate deploy 2>&1 | tee "tmp/dashboard-validation/migrate-deploy-${pass}.log"
            npx tsx scripts/quarantine-dashboard-methodology-history.ts 2>&1 | tee "tmp/dashboard-validation/methodology-cutover-${pass}.log"
            npx tsx scripts/backfill-dashboard-signal-approvals.ts 2>&1 | tee "tmp/dashboard-validation/signal-backfill-${pass}.log"
          done

      - name: Require an up-to-date, drift-free schema
        shell: bash
        run: |
          set -o pipefail
          npx prisma migrate status 2>&1 | tee tmp/dashboard-validation/migrate-status.log
          npx prisma migrate diff \
            --from-schema=prisma/schema.prisma \
            --to-config-datasource \
            --exit-code 2>&1 | tee tmp/dashboard-validation/schema-drift.log

      - name: Run focused dashboard tests
        run: >-
          npx vitest run
          src/modules/dashboard
          src/components/admin/DashboardSignalReviewButtons.test.tsx

      - name: Type check
        run: npx tsc --noEmit

      - name: Build application
        run: npm run build

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dashboard-validation-${{ github.run_id }}
          path: tmp/dashboard-validation/
          if-no-files-found: warn
          retention-days: 14
